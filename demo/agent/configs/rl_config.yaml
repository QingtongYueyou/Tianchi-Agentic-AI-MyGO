# RL训练超参数配置
# 物流调度PPO智能体 - 目标月收入30W+

# ===== 环境配置 =====
env:
  state_dim: 79              # 状态向量维度
  action_dim: 18             # 动作空间大小
  max_cargo_candidates: 10   # 最大候选货源数
  reposition_speed_kmh: 60.0 # 空驶速度 km/h
  simulation_days: 31        # 月度天数
  simulation_minutes: 44640  # 31天总分钟数

# ===== PPO超参数 =====
ppo:
  learning_rate: 3.0e-4      # Adam学习率
  gamma: 0.995               # 折扣因子（高，因为月度长期收益）
  gae_lambda: 0.95           # GAE lambda
  clip_epsilon: 0.2          # PPO clip范围
  entropy_coef: 0.01         # 熵正则系数（鼓励探索）
  value_coef: 0.5            # 价值损失系数
  max_grad_norm: 0.5         # 梯度裁剪
  batch_size: 256            # mini-batch大小
  n_epochs: 10               # 每次更新的epoch数
  n_steps: 2048              # 每次收集的步数

maskable_ppo:
  teacher_pretrain_steps: 512
  teacher_pretrain_epochs: 2
  teacher_batch_size: 128
  teacher_learning_rate: 1.0e-4
  teacher_min_cargo_score: 0.0

# ===== 训练配置 =====
training:
  # Phase 1: 行为克隆预训练
  bc_episodes: 50            # 行为克隆episodes数
  bc_learning_rate: 1.0e-3   # BC阶段学习率
  
  # Phase 2: PPO强化学习
  ppo_episodes: 1000         # PPO训练episodes总数
  eval_interval: 50          # 每N个episode评估一次
  save_interval: 100         # 每N个episode保存checkpoint
  
  # Phase 3: 针对性微调
  finetune_episodes: 200     # 微调episodes数
  finetune_lr: 1.0e-4        # 微调学习率（更小）
  finetune:
    base_model: "demo/agent/models/policy_maskable_best.zip"
    learning_rate_factor: 0.5
    regression_threshold: 0.95
  
  # 课程学习
  curriculum:
    enabled: true
    start_days: 5            # 初始训练天数（先学5天）
    increment_days: 5        # 每N个episode增加天数
    increment_every: 100     # 增加天数的间隔
    max_days: 31             # 最终训练全月
  
  # 经验回放
  replay:
    enabled: true
    buffer_size: 10000       # 经验池大小
    high_income_threshold: 200000  # 高收入episode的判断阈值（元）
    high_income_weight: 2.0  # 高收入episode的采样权重倍率

# ===== 网络架构 =====
network:
  policy:
    hidden_dims: [256, 256, 128]
    use_layer_norm: true
  
  value_net:
    input_dim: 10
    hidden_dims: [64, 64, 32]
  
  order_scorer:
    state_dim: 20
    cargo_dim: 8
    state_hidden: [64, 64]
    cargo_hidden: [32, 32]
    combined_hidden: [64, 32]
    dropout: 0.1
  
  deadhead_optimizer:
    input_dim: 5
    hidden_dims: [32, 16]

# ===== 司机个性化配置 =====
driver_profiles:
  # 低活跃司机 - 使用激进探索策略
  aggressive:
    driver_ids: ["D002", "D006", "D007"]
    idle_penalty_coef: 0.1       # 空等惩罚系数
    order_bonus: 0.5             # 额外接单奖励
    min_acceptable_net: -100.0   # 允许微亏接单
    max_idle_hours: 2.0          # 超过N小时不接单开始惩罚
  
  # 空驶受限司机
  deadhead_constrained:
    driver_ids: ["D003"]
    deadhead_safety_factor: 0.8  # 月度空驶预算安全系数
    deadhead_penalty_coef: 0.5   # 超限风险惩罚系数
  
  # 休息受限司机
  rest_constrained:
    driver_ids: ["D001", "D008"]
    rest_bonus: 0.3              # 完成休息要求奖励
    rest_penalty_coef: 0.5       # 预罚（比实际更重，鼓励提前规划）

# ===== Reward 权重 =====
reward:
  income_scale: 0.001          # 收入缩放（1元 = 0.001 reward单位）
  penalty_scale: 0.002         # 罚分放大系数（比收益更重要）
  wait_penalty: 0.05           # 每小时空等惩罚
  urgency_start_day: 20        # 从第N天开始加速紧迫度
  urgency_max_multiplier: 1.5  # 月末最大紧迫度倍率

# ===== 路径配置 =====
paths:
  models_dir: "demo/agent/models"
  logs_dir: "demo/results/rl_logs"
  checkpoint_prefix: "rl_checkpoint"
  best_model_name: "policy_best"
